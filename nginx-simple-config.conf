# Simple HTTP Nginx Configuration for svagnoni.linkeddata.es
# Deliberation Knowledge Graph Platform - Quick Start

server {
    listen 80;
    server_name svagnoni.linkeddata.es;

    # Document root
    root /home/svagnoni/Deliberation-Knowledge-Graph;
    index index.html;

    # GZIP compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/turtle
        application/xml
        application/xhtml+xml
        application/rss+xml
        application/javascript
        application/x-javascript
        application/json
        application/rdf+xml;

    # API endpoints - proxy to Flask application
    location ~ ^/(api|sparql)/ {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
    }

    # SPARQL endpoint
    location /sparql {
        proxy_pass http://127.0.0.1:8085/sparql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers for SPARQL
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    # Dynamic HTML routes - proxy to Flask application
    location = /visualize {
        proxy_pass http://127.0.0.1:8085/visualize;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /contributions {
        proxy_pass http://127.0.0.1:8085/contributions;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
    }

    # Security: Block access to sensitive files
    location ~ \.(py|conf|log|sh)$ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }

    # Main route - serve index.html or proxy to Flask
    location / {
        try_files $uri $uri/ @flask;
        expires 1h;
    }

    # Fallback to Flask application
    location @flask {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Logging
    access_log /var/log/nginx/svagnoni.linkeddata.es_access.log;
    error_log /var/log/nginx/svagnoni.linkeddata.es_error.log;
}