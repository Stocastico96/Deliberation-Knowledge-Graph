# Apache Virtual Host Configuration for svagnoni.linkeddata.es
# Deliberation Knowledge Graph Platform

<VirtualHost *:80>
    ServerName svagnoni.linkeddata.es
    DocumentRoot /home/svagnoni/deliberation-knowledge-graph

    # Redirect HTTP to HTTPS
    Redirect permanent / https://svagnoni.linkeddata.es/
</VirtualHost>

<VirtualHost *:443>
    ServerName svagnoni.linkeddata.es
    DocumentRoot /home/svagnoni/Deliberation-Knowledge-Graph

    # SSL Configuration (adjust paths as needed)
    SSLEngine on
    SSLCertificateFile /path/to/ssl/certificate.crt
    SSLCertificateKeyFile /path/to/ssl/private.key
    SSLCertificateChainFile /path/to/ssl/certificate-chain.crt

    # Security headers
    Header always set X-Frame-Options DENY
    Header always set X-Content-Type-Options nosniff
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Proxy configuration for Flask application
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:8085/api/
    ProxyPassReverse /api/ http://127.0.0.1:8085/api/
    ProxyPass /sparql http://127.0.0.1:8085/sparql
    ProxyPassReverse /sparql http://127.0.0.1:8085/sparql

    # Serve static HTML files directly from Apache for better performance
    Alias /visualize /home/svagnoni/deliberation-knowledge-graph/visualize_kg.html
    Alias /contributions /home/svagnoni/deliberation-knowledge-graph/contributions.html

    # Handle root requests
    DirectoryIndex index.html

    # For all other requests, proxy to Flask
    ProxyPass /static/ !
    ProxyPass /js/ !
    ProxyPass /css/ !
    ProxyPass /images/ !
    ProxyPass / http://127.0.0.1:8085/
    ProxyPassReverse / http://127.0.0.1:8085/

    # Directory permissions
    <Directory "/home/svagnoni/deliberation-knowledge-graph">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Security: Don't serve Python files directly
        <Files "*.py">
            Require all denied
        </Files>

        # Security: Don't serve configuration files
        <Files "*.conf">
            Require all denied
        </Files>

        # Security: Don't serve log files
        <Files "*.log">
            Require all denied
        </Files>
    </Directory>

    # Enable GZIP compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/plain
        AddOutputFilterByType DEFLATE text/html
        AddOutputFilterByType DEFLATE text/xml
        AddOutputFilterByType DEFLATE text/css
        AddOutputFilterByType DEFLATE application/xml
        AddOutputFilterByType DEFLATE application/xhtml+xml
        AddOutputFilterByType DEFLATE application/rss+xml
        AddOutputFilterByType DEFLATE application/javascript
        AddOutputFilterByType DEFLATE application/x-javascript
        AddOutputFilterByType DEFLATE application/json
        AddOutputFilterByType DEFLATE text/turtle
        AddOutputFilterByType DEFLATE application/rdf+xml
    </IfModule>

    # Cache static assets
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType image/png "access plus 1 month"
        ExpiresByType image/jpg "access plus 1 month"
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/gif "access plus 1 month"
        ExpiresByType image/svg+xml "access plus 1 month"
    </IfModule>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/svagnoni.linkeddata.es_error.log
    CustomLog ${APACHE_LOG_DIR}/svagnoni.linkeddata.es_access.log combined
</VirtualHost>

# CORS headers for API endpoints (if needed)
<IfModule mod_headers.c>
    <LocationMatch "^/api/">
        Header set Access-Control-Allow-Origin "*"
        Header set Access-Control-Allow-Methods "GET, POST, OPTIONS"
        Header set Access-Control-Allow-Headers "Content-Type, Authorization"
    </LocationMatch>

    <LocationMatch "^/sparql">
        Header set Access-Control-Allow-Origin "*"
        Header set Access-Control-Allow-Methods "GET, POST, OPTIONS"
        Header set Access-Control-Allow-Headers "Content-Type, Authorization"
    </LocationMatch>
</IfModule>